services:
  postgres:
    image: postgres:16
    container_name: anotherme-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anotherme2
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anotherme2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: anotherme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: anotherme-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb -p local/anotherme2-artifacts || true;
      mc anonymous set download local/anotherme2-artifacts || true;
      exit 0;
      "

  anotherme-core:
    build:
      context: ./AnotherMe
    container_name: anotherme-core
    ports:
      - "3000:3000"
    working_dir: /app
    env_file:
      - ./AnotherMe/.env.local
    environment:
      ANOTHERME2_GATEWAY_BASE_URL: http://api-gateway:8080
      ANOTHERME2_GATEWAY_WS_BASE_URL: ${ANOTHERME2_GATEWAY_WS_BASE_URL:-ws://localhost:8080}
      RUNTIME_DATA_DIR: /app/data
      AUTH_DATA_DIR: /app/data
      AUTH_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/anotherme2
    volumes:
      - anotherme_data:/app/data

  api-gateway:
    build:
      context: ./AnotherMe
      dockerfile: anotherme2_engine/Dockerfile
    container_name: anotherme-api-gateway
    working_dir: /app/anotherme2_engine
    env_file:
      - ./AnotherMe/anotherme2_engine/api_gateway/.env
    environment:
      PYTHONUNBUFFERED: "1"
      GATEWAY_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/anotherme2
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_QUEUE_BACKEND: redis
      ANOTHERME_BASE_URL: http://anotherme-core:3000
      OBJECT_STORAGE_DRIVER: minio
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_BUCKET: anotherme2-artifacts
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-http://localhost:9000/anotherme2-artifacts}
      LOCAL_STORAGE_ROOT: /app/gateway_data/objects
      GATEWAY_WORKER_TEMP_ROOT: /app/gateway_data/tmp
      GATEWAY_WORKER_OUTPUT_ROOT: /app/gateway_data/runs
    volumes:
      - gateway_data:/app/gateway_data
    command: ["python", "run_gateway.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      anotherme-core:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway-worker:
    build:
      context: ./AnotherMe
      dockerfile: anotherme2_engine/Dockerfile
    container_name: anotherme-api-gateway-worker
    working_dir: /app/anotherme2_engine
    env_file:
      - ./AnotherMe/anotherme2_engine/api_gateway/.env
    environment:
      PYTHONUNBUFFERED: "1"
      GATEWAY_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/anotherme2
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_QUEUE_BACKEND: redis
      ANOTHERME_BASE_URL: http://anotherme-core:3000
      OBJECT_STORAGE_DRIVER: minio
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_BUCKET: anotherme2-artifacts
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-http://localhost:9000/anotherme2-artifacts}
      LOCAL_STORAGE_ROOT: /app/gateway_data/objects
      GATEWAY_WORKER_TEMP_ROOT: /app/gateway_data/tmp
      GATEWAY_WORKER_OUTPUT_ROOT: /app/gateway_data/runs
    volumes:
      - gateway_data:/app/gateway_data
    command: ["python", "run_gateway_worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      api-gateway:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: anotherme-nginx
    profiles:
      - https
    environment:
      NGINX_ENVSUBST_FILTER: "^(NGINX_|CORE_|GATEWAY_|MINIO_)"
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-200m}
      NGINX_CERTIFICATE: ${NGINX_CERTIFICATE:-/etc/nginx/certs/fullchain.pem}
      NGINX_CERTIFICATE_KEY: ${NGINX_CERTIFICATE_KEY:-/etc/nginx/certs/privkey.pem}
      CORE_UPSTREAM: http://anotherme-core:3000
      GATEWAY_UPSTREAM: http://api-gateway:8080
      MINIO_UPSTREAM: http://minio:9000
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      anotherme-core:
        condition: service_started
      api-gateway:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"

volumes:
  pg_data:
  redis_data:
  minio_data:
  anotherme_data:
  gateway_data:
